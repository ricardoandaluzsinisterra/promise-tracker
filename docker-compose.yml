services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 127.0.0.1 2181 | grep imok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CONFLUENT_SUPPORT_METRICS_ENABLE: 'false'
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  promises-service:
    build:
      context: "./Promises Service"
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKER: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-promises:
        condition: service_healthy
    networks:
      - internal

  politicians-service:
    build:
      context: "./Politicians Service"
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKER: "kafka:9092"
    depends_on:
      kafka:
        condition: service_started
      postgres-politicians:
        condition: service_healthy
    networks:
      - internal

  trackers-service:
    build:
      context: "./Trackers Service"
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKER: "kafka:9092"
    depends_on:
      kafka:
        condition: service_started
      postgres-trackers:
        condition: service_healthy
    networks:
      - internal

  sources-service:
    build:
      context: "./Sources Service"
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKER: "kafka:9092"
    depends_on:
      kafka:
        condition: service_started
      postgres-sources:
        condition: service_healthy
    networks:
      - internal

  projection-service:
    build:
      context: "./Projection Service"
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKER: "kafka:9092"
    depends_on:
      kafka:
        condition: service_started
      postgres-projection:
        condition: service_healthy
    networks:
      - internal

  api-gateway:
    build:
      context: "./API Gateway"
      dockerfile: Dockerfile
    environment:
      PROMISES_SERVICE_URL: "http://promises-service:8000"
      POLITICIANS_SERVICE_URL: "http://politicians-service:8000"
      TRACKERS_SERVICE_URL: "http://trackers-service:8000"
      SOURCES_SERVICE_URL: "http://sources-service:8000"
      PROJECTION_SERVICE_URL: "http://projection-service:8000"
    ports:
      - "8000:8000"
    depends_on:
      promises-service:
        condition: service_started
      politicians-service:
        condition: service_started
      trackers-service:
        condition: service_started
      sources-service:
        condition: service_started
      projection-service:
        condition: service_started
    networks:
      - internal
      - public

# AI Prompt:
# I need separated postgres instances for each service (except the API Gateway), could you generate this and make sure to identify them properly? 
# Also make sure that all of the services include a depends tag so that they dont start until their DB instance is up and running.

  postgres-promises:
    image: postgres:17
    environment:
      POSTGRES_DB: promises_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-promises-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  postgres-politicians:
    image: postgres:17
    environment:
      POSTGRES_DB: politicians_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-politicians-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  postgres-trackers:
    image: postgres:17
    environment:
      POSTGRES_DB: trackers_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-trackers-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  postgres-sources:
    image: postgres:17
    environment:
      POSTGRES_DB: sources_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-sources-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  postgres-projection:
    image: postgres:17
    environment:
      POSTGRES_DB: projection_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-projection-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
volumes:
  zookeeper_data:
  kafka_data:
  postgres-promises-data:
  postgres-politicians-data:
  postgres-trackers-data:
  postgres-sources-data:
  postgres-projection-data:

networks:
  internal:
    internal: true
  public:


